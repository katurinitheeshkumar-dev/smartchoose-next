<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; background: #f8fafc; }
    .btn { 
      background: #10b981; color: white; border: none; padding: 12px; 
      width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer;
      margin-top: 10px;
    }
    .btn:hover { background: #059669; }
    .status { font-size: 12px; color: #64748b; margin-bottom: 10px; }
    h2 { margin: 0 0 10px 0; font-size: 16px; color: #1e293b; }
    #data-preview { 
      font-size: 10px; background: #fff; border: 1px solid #e2e8f0; 
      padding: 8px; border-radius: 4px; max-height: 100px; overflow-y: auto;
      display: none;
    }
  </style>
</head>
<body>
  <h2>SmartChoose Extractor</h2>
  <div id="status" class="status">Open Amazon or Flipkart to extract data.</div>
  <pre id="data-preview"></pre>
   <button id="copy-btn" class="btn">Copy JSON Data</button>
   <button id="admin-btn" class="btn" style="background: #0f172a; margin-top: 5px;">Go to Admin</button>

  <script src="popup.js"></script>
</body>
</html>
